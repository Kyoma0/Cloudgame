<!DOCTYPE html>
<html>
<head>
  <title>Cloudgame - Abrir Moonlight</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 500px;
    }
    h1 { color: #22d3ee; margin-bottom: 10px; }
    .subtitle { color: #94a3b8; margin-bottom: 30px; }
    .info {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
    }
    .info p { margin: 8px 0; color: #e2e8f0; }
    .info strong { color: #22d3ee; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #22d3ee;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      margin: 10px;
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover { background: #06b6d4; transform: scale(1.05); }
    .error { color: #ef4444; font-size: 14px; margin-top: 20px; }
    .success { color: #22c55e; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(34,211,238,0.3);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cloudgame</h1>
    <p class="subtitle">Conectando ao servidor de jogos...</p>
    
    <div id="loading">
      <div class="spinner"></div>
      <p>Abrindo Moonlight Desktop...</p>
    </div>
    
    <div id="success" style="display:none;">
      <p class="success">Moonlight Desktop deve ter aberto!</p>
      <p style="color:#94a3b8;">Verifique sua tela.</p>
    </div>
    
    <div id="manual" style="display:none;">
      <div class="info">
        <p><strong>Host:</strong> <span id="hostDisplay"></span></p>
        <p><strong>Jogo:</strong> <span id="appDisplay"></span></p>
      </div>
      <p style="color:#94a3b8; margin-bottom:20px;">
        O Moonlight não abriu automaticamente.<br>
        Por favor, abra manualmente:
      </p>
      <a id="manualLink" href="#" class="btn">Abrir Moonlight</a>
      <p class="error" id="errorMsg"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const host = params.get('host') || '192.168.15.119';
    const app = params.get('app') || 'Desktop';
    
    document.getElementById('hostDisplay').textContent = host;
    document.getElementById('appDisplay').textContent = app;
    document.getElementById('manualLink').href = `moonlight://connect?host=${encodeURIComponent(host)}&app=${encodeURIComponent(app)}`;
    
    // Tentar múltiplos métodos para abrir moonlight://
    function tryOpenMoonlight() {
      const url = `moonlight://connect?host=${encodeURIComponent(host)}&app=${encodeURIComponent(app)}`;
      
      // Método 1: location.href
      window.location.href = url;
      
      // Método 2: Abrir nova janela (pode ser bloqueado)
      setTimeout(() => {
        const popup = window.open(url, '_blank', 'width=1,height=1');
        if (popup) popup.close();
      }, 100);
    }
    
    // Tentar abrir
    tryOpenMoonlight();
    
    // Verificar se abriu após 3 segundos
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('manual').style.display = 'block';
    }, 3000);
  </script>
</body>
</html>
